name: ingest

on:
  issues:
    types: [opened]

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'setup:submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Merge bundle-pending branch content if referenced
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "
          const body = process.env.ISSUE_BODY;
          try {
            const d = JSON.parse(body);
            if (d.bundle && d.bundle.present && d.bundle.pendingBranch) {
              console.log('BRANCH:' + d.bundle.pendingBranch);
            }
          } catch {}
          " | tee /tmp/branch.txt
          BRANCH=$(grep '^BRANCH:' /tmp/branch.txt | sed 's/^BRANCH://')
          if [ -n "$BRANCH" ]; then
            echo "Fetching bundle from $BRANCH"
            git fetch origin "refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
            git checkout "origin/$BRANCH" -- bundle-pending/
          fi
      - name: Parse aliases
        id: aliases
        run: |
          # Load tag-aliases.yml into JSON via a tiny Python step (no npm deps)
          python3 -c "
          import yaml, json
          with open('data/tag-aliases.yml') as f:
              aliases = yaml.safe_load(f) or {}
          with open('/tmp/aliases.json', 'w') as f:
              json.dump(aliases, f)
          "
      - name: Run ingest
        id: ingest
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          node -e "
          import('./scripts/ingest.mjs').then(async ({ ingestIssue }) => {
            const fs = await import('node:fs/promises');
            const aliases = JSON.parse(await fs.readFile('/tmp/aliases.json', 'utf-8'));
            const r = await ingestIssue({
              dataRoot: 'data',
              issueBody: process.env.ISSUE_BODY,
              issueAuthor: process.env.ISSUE_AUTHOR,
              aliases,
            });
            if (!r.ok) {
              console.error('INGEST_FAILED: ' + r.reason);
              process.exit(2);
            }
            console.log('INGEST_OK: ' + r.path);
          }).catch(e => { console.error(e); process.exit(1); });
          "
      - name: Commit + close (on success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SLUG=$(node -e "console.log(JSON.parse(process.env.ISSUE_BODY).id.slug)")
          git config user.name "claude-setups-bot"
          git config user.email "bot@claude-setups.dev"
          # Remove the bundle-pending/ working-tree file if ingest moved it (stages the deletion)
          rm -rf bundle-pending
          for dir in data/setups data/bundles bundle-pending; do
            [ -e "$dir" ] || git ls-files --error-unmatch "$dir" >/dev/null 2>&1 && git add -A "$dir" 2>/dev/null || true
          done
          git add -A data/setups data/bundles 2>/dev/null || true
          git add -A bundle-pending 2>/dev/null || true
          PUSH_OK=0
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            PUSH_OK=1
          else
            git commit -m "ingest: $AUTHOR/$SLUG (issue #$ISSUE_NUMBER)"
            for i in 1 2 3; do
              if git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" && git push; then
                PUSH_OK=1
                break
              fi
              echo "Push failed, retry $i/3..."
              sleep 2
            done
          fi
          if [ "$PUSH_OK" != "1" ]; then
            echo "::error::Failed to push ingest commit after 3 retries"
            exit 1
          fi
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/#/setup/$AUTHOR/$SLUG"
          gh issue comment "$ISSUE_NUMBER" --body "Published: $PAGES_URL"
          gh issue close "$ISSUE_NUMBER"
      - name: Delete pending bundle branch (on success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BRANCH=$(node -e "
          try {
            const d = JSON.parse(process.env.ISSUE_BODY);
            if (d.bundle?.pendingBranch) console.log(d.bundle.pendingBranch);
          } catch {}
          ")
          if [ -n "$BRANCH" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$BRANCH" || true
          fi
      - name: Comment + label on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Validation failed. Check the action logs."
          gh issue edit "$ISSUE_NUMBER" --add-label "invalid"
